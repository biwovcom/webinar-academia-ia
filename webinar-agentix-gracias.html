<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#060402">
<meta name="robots" content="noindex, nofollow">
<title>¡Registro confirmado! Únete al grupo | AGENTIX</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">

<!-- ============================================================
     META PIXEL — pega aquí el mismo código base del Pixel de Meta
     que en la landing principal (opcional: evento de vista de esta
     página puente sirve para medir cuántos llegan hasta acá).
============================================================ -->

<style>
:root{
  --bg:#060402;
  --orange:#FF6A00;
  --orange2:#FF7A18;
  --orange-soft:#FFB673;
  --blue:#64CEFB;
  --blue-soft:#A9E4FD;
  --text:#FFFFFF;
  --muted:rgba(255,255,255,.66);
  --muted2:rgba(255,255,255,.44);
  --glass:rgba(255,255,255,.045);
  --border:rgba(255,122,24,.30);
  --border-soft:rgba(255,122,24,.16);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.glow{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.glow-1{width:620px;height:620px;background:var(--orange);top:-220px;left:-160px;opacity:.30;}
.glow-2{width:520px;height:520px;background:var(--blue);bottom:-180px;right:-160px;opacity:.16;}

.card{
  position:relative;z-index:1;width:100%;max-width:480px;
  padding:40px 32px;border-radius:24px;text-align:center;
  background:var(--glass);border:1px solid var(--border-soft);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:99px;margin-bottom:22px;
  font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  background:rgba(255,106,0,.12);border:1px solid var(--border);color:var(--orange-soft);
}
h1{
  font-weight:900;letter-spacing:-.01em;
  font-size:clamp(1.5rem,5vw,2rem);
  margin-bottom:14px;color:#fff;
}
.sub{color:var(--muted);font-size:.98rem;max-width:380px;margin:0 auto 28px;}

.spinner{
  width:22px;height:22px;margin:0 auto 28px;border-radius:50%;
  border:3px solid rgba(255,255,255,.14);border-top-color:var(--orange);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.btn-cta{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:19px 24px;border-radius:99px;
  font-size:1rem;font-weight:900;letter-spacing:.01em;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#0a0603;text-decoration:none;
  box-shadow:0 12px 44px rgba(255,106,0,.42), inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .2s, box-shadow .2s;
}
.btn-cta:hover{transform:translateY(-3px);box-shadow:0 18px 60px rgba(255,106,0,.58), inset 0 1px 0 rgba(255,255,255,.35);}
.btn-cta:active{transform:translateY(-1px);}

.note{margin-top:20px;color:var(--muted2);font-size:.82rem;}

@media (max-width:480px){
  .card{padding:32px 22px;}
  .btn-cta{padding:17px 20px;font-size:.94rem;}
}
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<main class="card">
  <span class="badge">✅ Registro confirmado</span>
  <h1>Ya casi estás dentro</h1>
  <p class="sub">Te estamos llevando al grupo de WhatsApp del webinar. Si no se abre solo en unos segundos, toca el botón.</p>
  <div class="spinner" aria-hidden="true"></div>
  <a href="https://chat.whatsapp.com/LYauyh8qypGJE1QfNzbpbV" id="join-btn" class="btn-cta">UNIRME AL GRUPO DE WHATSAPP →</a>
  <p class="note">Ahí recibirás el enlace de acceso a la clase en vivo.</p>
</main>

<script>
/* ===================== CONFIG — debe ser el mismo link que en la landing principal ===================== */
const WHATSAPP_GROUP_LINK = 'https://chat.whatsapp.com/LYauyh8qypGJE1QfNzbpbV';
/* =========================================================================================================== */

document.getElementById('join-btn').href = WHATSAPP_GROUP_LINK;

// Auto-redirect. Si el navegador (ej. in-app de Instagram/Facebook) lo bloquea,
// el botón de arriba ya está visible y funcional como respaldo — nadie se queda sin salida.
setTimeout(function(){
  window.location.href = WHATSAPP_GROUP_LINK;
}, 900);
</script>

</body>
</html>
